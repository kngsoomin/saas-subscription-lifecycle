---
- name: Bootstrap EC2 for Airflow (Docker + Compose + dirs)
  hosts: airflow
  become: true
  vars:
    project_dir: /opt/saas-subscription-lifecycle
    docker_apt_arch: "{{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else 'arm64' }}"
  tasks:
    - name: Update apt cache and install base packages
      ansible.builtin.apt:
        update_cache: yes
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker engine and Compose plugin
      ansible.builtin.apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create deployment target directory
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Ensure runtime subdirectories exist (logs/dags/plugins)
      ansible.builtin.file:
        path: "{{ project_dir }}/{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - logs
        - dags
        - plugins

    - name: Get ubuntu uid
      ansible.builtin.command: id -u ubuntu
      register: ubuntu_uid
      changed_when: false

    - name: Write Airflow env file (.env)
      ansible.builtin.copy:
        dest: "{{ project_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          AIRFLOW_UID={{ ubuntu_uid.stdout }}

    - name: Print versions (sanity check)
      ansible.builtin.shell: |
        set -e
        docker --version
        docker compose version
      register: version_out
      changed_when: false

    - name: Show sanity check output
      ansible.builtin.debug:
        var: version_out.stdout_lines