---
- name: Initialize Airflow (one-time setup)
  hosts: airflow
  become: true

  vars:
    project_dir: /opt/saas-subscription-lifecycle
    compose_file: docker-compose.airflow.yml

    airflow_admin_user: admin
    airflow_admin_pass: DevOnly123!
    airflow_admin_email: admin@example.com

  tasks:
    - name: Verify compose file exists
      ansible.builtin.stat:
        path: "{{ project_dir }}/{{ compose_file }}"
      register: compose_stat

    - name: Fail if compose file is missing
      ansible.builtin.fail:
        msg: "Compose file not found: {{ project_dir }}/{{ compose_file }}"
      when: not compose_stat.stat.exists

    - name: Bring up Postgres first
      ansible.builtin.shell: docker compose -f {{ compose_file }} up -d postgres
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for Postgres to be ready
      ansible.builtin.shell: docker compose -f {{ compose_file }} exec -T postgres pg_isready -U airflow
      args:
        chdir: "{{ project_dir }}"
      register: pg_ready
      retries: 40
      delay: 3
      until: pg_ready.rc == 0

    - name: Run Airflow DB migrations
      ansible.builtin.shell: docker compose -f {{ compose_file }} run --rm airflow-webserver airflow db migrate
      args:
        chdir: "{{ project_dir }}"

    - name: Create admin user if missing
      ansible.builtin.shell: |
        set -euo pipefail
        if docker compose -f {{ compose_file }} run --rm airflow-webserver airflow users list | awk '{print $1}' | grep -qx '{{ airflow_admin_user }}'; then
          echo "Admin user '{{ airflow_admin_user }}' already exists. Skipping."
        else
          docker compose -f {{ compose_file }} run --rm airflow-webserver airflow users create \
            --username '{{ airflow_admin_user }}' \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email '{{ airflow_admin_email }}' \
            --password '{{ airflow_admin_pass }}'
        fi
      args:
        chdir: "{{ project_dir }}"
        executable: /bin/bash

    - name: Bring up Airflow webserver and scheduler
      ansible.builtin.shell: docker compose -f {{ compose_file }} up -d airflow-webserver airflow-scheduler
      args:
        chdir: "{{ project_dir }}"

    - name: Show running containers
      ansible.builtin.shell: docker compose -f {{ compose_file }} ps
      args:
        chdir: "{{ project_dir }}"
      register: ps_out
      changed_when: false

    - name: Print docker compose ps
      ansible.builtin.debug:
        var: ps_out.stdout_lines